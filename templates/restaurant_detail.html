<!DOCTYPE html>
<html>
<head>
    <title>{{ restaurant.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light px-4">
    <a class="navbar-brand" href="/">Zomato Clone</a>

    <div>
        {% if request.user.is_authenticated %}
            <span class="me-2">Hello, {{ request.user.username }}</span>
            <a href="/users/logout/" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="/users/login/" class="btn btn-primary btn-sm">Login</a>
            <a href="/users/signup/" class="btn btn-success btn-sm">Signup</a>
        {% endif %}
    </div>
</nav>

<!-- Content -->
<div class="container mt-5">

    <h1>{{ restaurant.name }}</h1>

    <img src="{{ restaurant.image }}" class="img-fluid rounded mb-4">

    <div class="card p-3">
        <p><strong>📍 Location:</strong> {{ restaurant.location }}</p>
        <p><strong>🍽 Cuisine:</strong> {{ restaurant.cuisine }}</p>
        <p><strong>⭐ Rating:</strong> {{ restaurant.rating }}</p>
    </div>

    <a href="/" class="btn btn-secondary mt-3">⬅ Back to Home</a>

</div>
<a href="{% url 'add_to_cart' restaurant.id %}" class="btn btn-success mt-3">
    Add to Cart
</a>

</body>
</html>
