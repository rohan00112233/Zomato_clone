{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card border-0 shadow-lg restaurant-detail-card">

        <!-- Restaurant Image -->
        <img src="{{ restaurant.image }}" class="restaurant-image">

        <div class="card-body p-5">

            <!-- Top Section -->
            <div class="d-flex justify-content-between align-items-center flex-wrap">

                <div>

                    <h1 class="fw-bold mb-3">
                        {{ restaurant.name }}
                    </h1>

                    <p class="text-muted fs-5 mb-2">
                        {{ restaurant.cuisine }}
                    </p>

                    <p class="text-muted">
                        📍 {{ restaurant.location }}
                    </p>

                </div>

                <!-- Rating -->
                <div class="rating-box">
                    ⭐ {{ restaurant.rating }}
                </div>

            </div>

            <hr class="my-4">

            <!-- Extra Info -->
            <div class="row text-center">

                <div class="col-md-4 mb-3">

                    <div class="info-box">

                        <h5>🕒 Delivery Time</h5>

                        <p class="text-muted">
                            30-40 mins
                        </p>

                    </div>

                </div>

                <div class="col-md-4 mb-3">

                    <div class="info-box">

                        <h5>💳 Payment</h5>

                        <p class="text-muted">
                            Cash & Online
                        </p>

                    </div>

                </div>

                <div class="col-md-4 mb-3">

                    <div class="info-box">

                        <h5>🍔 Category</h5>

                        <p class="text-muted">
                            {{ restaurant.cuisine }}
                        </p>

                    </div>

                </div>

            </div>

            <!-- Add To Cart Button -->
            <div class="text-center mt-5">

                <a href="{% url 'add_to_cart' restaurant.id %}" class="btn btn-danger add-cart-btn">

                    Add To Cart

                </a>

            </div>

        </div>

    </div>

</div>

<style>
    .restaurant-detail-card {
        border-radius: 20px;
        overflow: hidden;
        background-color: white;
    }

    .restaurant-image {
        width: 100%;
        height: 450px;
        object-fit: cover;
    }

    .rating-box {
        background-color: green;
        color: white;
        padding: 12px 22px;
        border-radius: 12px;
        font-size: 20px;
        font-weight: 600;
    }

    .info-box {
        background-color: #f8f9fa;
        padding: 25px;
        border-radius: 15px;
        transition: 0.3s;
    }

    .info-box:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .add-cart-btn {
        padding: 14px 40px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
    }
</style>

{% endblock %}
