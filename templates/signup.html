<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Signup</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
        <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
        <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
        <input type="text" name="phone" placeholder="Phone" class="form-control mb-2" required>
        <textarea name="address" placeholder="Address" class="form-control mb-2"></textarea>

        <button type="submit" class="btn btn-danger">Signup</button>
    </form>
</div>

</body>
</html>
